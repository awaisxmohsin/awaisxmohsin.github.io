<style>
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:'Montserrat',sans-serif;background:#111;color:#fff;-webkit-font-smoothing:antialiased;opacity:1;transition:opacity .4s ease}
    body.is-leaving{opacity:0;transform:translateY(-20px)}
    a{color:inherit;text-decoration:none}

    nav{position:sticky;top:0;display:flex;justify-content:space-between;align-items:center;padding:24px 44px;z-index:100;background:rgba(17,17,17,.95);backdrop-filter:blur(12px);border-bottom:1px solid #1a1a1a}
    .nav-brand{font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;line-height:1.4;transition:opacity .25s}
    .nav-brand:hover{opacity:.6}
    .nav-center{display:flex;gap:32px}
    .nav-center a{font-size:12px;font-weight:700;letter-spacing:.5px;transition:opacity .25s}
    .nav-center a:hover{opacity:.5}
    .nav-clock{font-size:12px;font-weight:700;letter-spacing:.5px}

    .back-nav{padding:20px 44px}
    .back-nav a{font-size:11px;color:#666;transition:color .25s}
    .back-nav a:hover{color:#fff}

    .page-content{opacity:0;transform:translateY(30px);animation:fadeInUp .8s .1s ease forwards}
    @keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}

    .project-body{padding:0 44px}

    /* IMAGE ROWS */
    .row{display:grid;gap:10px;margin-bottom:10px}
    .row.cols-1{grid-template-columns:1fr}
    .row.cols-2{grid-template-columns:1fr 1fr}
    .row.cols-3{grid-template-columns:1fr 1fr 1fr}
    .row.cols-4{grid-template-columns:1fr 1fr 1fr 1fr}

    .cell{overflow:hidden;background:#1a1a1a}
    .cell.r-1-1{aspect-ratio:1/1}
    .cell.r-3-4{aspect-ratio:3/4}
    .cell.r-4-3{aspect-ratio:4/3}
    .cell.r-16-9{aspect-ratio:16/9}
    .cell.r-9-16{aspect-ratio:9/16}
    .cell.r-2-3{aspect-ratio:2/3}
    .cell.r-3-2{aspect-ratio:3/2}

    .cell img{width:100%;height:100%;object-fit:cover;display:block}

    /* TEXT SECTION */
    .text-section{display:grid;grid-template-columns:1fr 1fr;gap:80px;padding:100px 0;align-items:start}
    .text-section .col-left h2{font-size:clamp(24px,3.5vw,38px);font-weight:700;line-height:1.25;letter-spacing:-.5px;color:#fff}
    .text-section .col-left p{font-size:13px;font-weight:400;color:#666;margin-top:8px}
    .text-section .col-right{padding-top:6px}
    .text-section .col-right p{font-size:14px;font-weight:400;color:#888;line-height:2;margin-bottom:18px}
    .text-section .col-right p:last-child{margin-bottom:0}

    /* PREV / NEXT */
    .bn{display:flex;justify-content:space-between;align-items:center;padding:60px 44px;border-top:1px solid #1a1a1a;margin-top:60px}
    .bn a{transition:opacity .25s}
    .bn a:hover{opacity:.7}
    .nl{font-size:9px;text-transform:uppercase;letter-spacing:3px;color:#444;margin-bottom:6px}
    .nn{font-size:16px;font-weight:500;color:#888}
    .bn .nx{text-align:right}

    @media(max-width:768px){
        nav{padding:18px 24px}
        .back-nav{padding:16px 24px}
        .project-body{padding:0 24px}
        .row.cols-4{grid-template-columns:1fr 1fr}
        .row.cols-3{grid-template-columns:1fr}
        .text-section{grid-template-columns:1fr;gap:30px;padding:60px 0}
        .bn{padding:40px 24px;flex-direction:column;gap:28px;text-align:center}
        .bn .nx{text-align:center}
    }
    @media(max-width:480px){
        .nav-center{gap:14px}
        .nav-center a,.nav-brand,.nav-clock{font-size:10px}
        .row.cols-2{grid-template-columns:1fr}
    }

    /* CUSTOM CURSOR */
    *,a,button{cursor:none !important}
    .cursor{position:fixed;top:0;left:0;width:17px;height:17px;background:#c489e2;border-radius:50%;pointer-events:none;z-index:99999;mix-blend-mode:difference;transform:translate(-50%,-50%);transition:width .3s ease,height .3s ease,background .3s ease}
    .cursor.hover{width:38px;height:38px}
    .cursor.loading{width:24px;height:24px;background:transparent;border:2px solid #fff;animation:cursorSpin .8s linear infinite}
    .cursor.loading::before,.cursor.loading::after{content:'';position:absolute;background:#fff;top:50%;left:50%;transform:translate(-50%,-50%)}
    .cursor.loading::before{width:12px;height:2px}
    .cursor.loading::after{width:2px;height:12px}
    @keyframes cursorSpin{to{transform:translate(-50%,-50%) rotate(360deg)}}
    @media(hover:none)and(pointer:coarse){.cursor{display:none !important}*,a,button{cursor:auto !important}}
</style>
</head>

<script>
function tick(){var n=new Date(),h=n.getHours(),m=String(n.getMinutes()).padStart(2,'0'),s=String(n.getSeconds()).padStart(2,'0'),ap=h>=12?'PM':'AM';h=h%12;h=h?h:12;document.getElementById('clock').textContent=String(h).padStart(2,'0')+':'+m+':'+s+' '+ap}
setInterval(tick,1000);tick();

document.querySelectorAll('a[href]').forEach(function(link){
    var href=link.getAttribute('href');
    if(href.startsWith('#')||href.startsWith('mailto:')) return;
    link.addEventListener('click',function(e){
        if(e.metaKey||e.ctrlKey) return;
        e.preventDefault();
        document.body.classList.add('is-leaving');
        setTimeout(function(){window.location.href=link.href},400);
    });
});
window.addEventListener('pageshow',function(){document.body.classList.remove('is-leaving')});
</script>

<script>
(function(){
    var cursor=document.getElementById('cursor');
    document.addEventListener('mousemove',function(e){cursor.style.left=e.clientX+'px';cursor.style.top=e.clientY+'px'});
    document.addEventListener('mouseover',function(e){if(e.target.closest('a,button,[role="button"]'))cursor.classList.add('hover')});
    document.addEventListener('mouseout',function(e){if(e.target.closest('a,button,[role="button"]'))cursor.classList.remove('hover')});
    document.querySelectorAll('a[href]').forEach(function(link){var href=link.getAttribute('href');if(href&&!href.startsWith('#')&&!href.startsWith('mailto:'))link.addEventListener('click',function(){cursor.classList.add('loading')})});
    window.addEventListener('pageshow',function(){cursor.classList.remove('loading')});
    document.addEventListener('mouseleave',function(){cursor.style.opacity='0'});
    document.addEventListener('mouseenter',function(){cursor.style.opacity='1'});
})();
</script>
