(function(){
var stage = document.getElementById('stage');
var items = document.querySelectorAll('.m-item');
var gap = 10;

function getCols(){
    if(window.matchMedia('(max-width:550px)').matches) return 2;
    if(window.matchMedia('(max-width:768px)').matches) return 3;
    return 3;
}

function layout(){
    var cols = getCols();
    var stageW = stage.offsetWidth;
    var colW = (stageW - gap * (cols - 1)) / cols;
    var colH = [];
    for(var c=0;c<cols;c++) colH.push(0);

    for(var i=0;i<items.length;i++){
        var card = items[i];
        card.style.width = colW+'px';
        card.style.height = 'auto';

        var short = 0;
        for(var c=1;c<cols;c++) if(colH[c]<colH[short]) short=c;

        card.style.transform = 'translate('+(short*(colW+gap))+'px,'+colH[short]+'px)';
        colH[short] += card.offsetHeight + gap;
    }

    var max = 0;
    for(var c=0;c<cols;c++) if(colH[c]>max) max=colH[c];
    stage.style.height = max+'px';
}

// Wait for images to load before calculating layout
var images = stage.querySelectorAll('img');
var loaded = 0;
var total = images.length;

function checkReady(){
    loaded++;
    if(loaded >= total) layout();
}

images.forEach(function(img){
    if(img.complete){
        checkReady();
    } else {
        img.addEventListener('load', checkReady);
        img.addEventListener('error', checkReady);
    }
});

window.addEventListener('resize', layout);
})();

document.querySelectorAll('a[href]').forEach(function(link){
    var href=link.getAttribute('href');
    if(href.startsWith('#')||href.startsWith('mailto:')) return;
    link.addEventListener('click',function(e){
        if(e.metaKey||e.ctrlKey) return;
        e.preventDefault();
        document.body.classList.add('is-leaving');
        setTimeout(function(){window.location.href=link.href},400);
    });
});
window.addEventListener('pageshow',function(){document.body.classList.remove('is-leaving')});
</script>

<script>
(function(){
    var cursor=document.getElementById('cursor');
    document.addEventListener('mousemove',function(e){cursor.style.left=e.clientX+'px';cursor.style.top=e.clientY+'px'});
    document.addEventListener('mouseover',function(e){if(e.target.closest('a,button,[role="button"]'))cursor.classList.add('hover')});
    document.addEventListener('mouseout',function(e){if(e.target.closest('a,button,[role="button"]'))cursor.classList.remove('hover')});
    document.querySelectorAll('a[href]').forEach(function(link){var href=link.getAttribute('href');if(href&&!href.startsWith('#')&&!href.startsWith('mailto:'))link.addEventListener('click',function(){cursor.classList.add('loading')})});
    window.addEventListener('pageshow',function(){cursor.classList.remove('loading')});
    document.addEventListener('mouseleave',function(){cursor.style.opacity='0'});
    document.addEventListener('mouseenter',function(){cursor.style.opacity='1'});
})();
</script>
